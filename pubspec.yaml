name: dose_vault
description: "A medication dose tracking app."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.6.1

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # UUID generation for medication IDs
  uuid: ^4.5.1

  # Date formatting
  intl: ^0.20.2

  # Percent indicator for adherence ring
  percent_indicator: ^4.2.5

  # Scheduled local notifications
  flutter_local_notifications: ^21.0.0

  # Timezone-aware DateTime for zonedSchedule
  timezone: ^0.11.0
  supabase_flutter: ^2.12.4
  flutter_dotenv: ^6.0.1
  firebase_core: ^4.7.0
  firebase_messaging: ^16.2.0
  url_launcher: ^6.3.2
  firebase_crashlytics: ^5.2.1
  permission_handler: ^12.0.1

  # PDF generation & native share/print
  pdf: ^3.11.2
  printing: ^5.14.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  mocktail: ^1.0.5
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7
  change_app_package_name: ^1.5.0

flutter:
  uses-material-design: true

  # Assets declaration
  assets:
    - .env
    - assets/images/

# --- APP ICON CONFIGURATION ---
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/app_icon_new.png"
  remove_alpha_ios: true # Apple crashes if app icons have transparent backgrounds
  adaptive_icon_background: "#FFFFFF" # Change this hex to match your app's brand color
  adaptive_icon_foreground: "assets/images/app_icon_new.png"

# --- NATIVE SPLASH SCREEN CONFIGURATION ---
flutter_native_splash:
  color: "#FFFFFF" # Change this hex to match your app's brand color
  image: "assets/images/app_icon_new.png"  
  android_12:
    image: "assets/images/app_icon_new.png"
    icon_background_color: "#FFFFFF"
    color: "#FFFFFF"